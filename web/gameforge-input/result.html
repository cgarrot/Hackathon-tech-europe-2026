<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GameForge · Jeu généré</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="result-panel">
        <div class="topbar">
          <a class="brand" href="./index.html" aria-label="Créer un autre jeu">
            <span class="brand-mark" aria-hidden="true">G</span>
            <span>GameForge</span>
          </a>
          <a class="ghost-link" href="./index.html">Nouveau jeu</a>
        </div>

        <header class="result-header">
          <div>
            <p class="eyebrow">Jeu généré</p>
            <h1 id="game-title">Jeu généré</h1>
          </div>
          <div class="game-meta" id="game-meta"></div>
        </header>

        <div class="result-grid">
          <section class="summary-band">
            <h2>Demande initiale</h2>
            <p id="original-prompt"></p>
          </section>

          <section class="cards-section">
            <div class="section-title">
              <h2>Rôles</h2>
              <span id="role-count"></span>
            </div>
            <div class="role-grid" id="roles"></div>
          </section>

          <section class="flow-section">
            <div class="section-title">
              <h2>Phases</h2>
              <span>Runtime</span>
            </div>
            <div class="phase-list" id="phases"></div>
          </section>

          <section class="integration-section">
            <div class="section-title">
              <h2>Hooks d’intégration</h2>
              <span>À brancher</span>
            </div>
            <div class="integration-grid" id="integrations"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="./result.js" type="module"></script>
  </body>
</html>
