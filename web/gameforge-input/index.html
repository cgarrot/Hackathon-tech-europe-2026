<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GameForge · Nouveau jeu</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="input-overlay">
      <form class="input-screen" id="game-form" aria-labelledby="page-title">
        <div class="input-heading">
          <h1 id="page-title">GameForge</h1>
          <p id="tagline">Décris le jeu que tu veux jouer. On le forge pendant que tu respires.</p>
        </div>

        <button class="mic-button hero-mic-button" type="button" id="mic-button">
          <span class="mic-icon" aria-hidden="true"></span>
          <span id="mic-label">Speak</span>
        </button>

        <textarea
          class="transcript-input"
          id="transcript-text"
          rows="4"
          placeholder="Ta demande apparaîtra ici. Tu peux la modifier avant de générer."
        ></textarea>

        <button class="primary-button hero-generate-button" type="submit" id="generate-button" disabled>
          <span class="button-icon" aria-hidden="true">↗</span>
          <span id="generate-label">Générer le jeu</span>
        </button>
      </form>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
